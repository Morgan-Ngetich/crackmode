services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - NODE_ENV=development

  backend:
    build:
      args:
        INSTALL_DEV: "true"
    environment:
      - DOMAIN=localhost
    volumes:
      - ./backend:/app

  db:
    ports:
      - "5433:5432"

volumes:
  uploads:
  crackmode_postgres_data:  # ← must match base file
    external: true
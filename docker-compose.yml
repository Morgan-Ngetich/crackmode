services:

  # FRONTEND SERVICE
  frontend:
    restart: always
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: frontend
    volumes:
      - uploads:/shared/uploads
    expose:
      - "8000"
      - "5173:5173"

  # BACKEND SERVICE
  backend:
    image: "backend:latest"
    command: "fastapi"
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    volumes:
      - uploads:/shared/uploads
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - db
    ports:
      - "8000:8000"
    expose:
      - "8000"

  # POSTGRES SERVICE
  db:
    image: postgres:15
    container_name: db
    restart: always
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD?Variable not set}
      - POSTGRES_USER=${POSTGRES_USER?Variable not set}
      - POSTGRES_DB=${POSTGRES_DB?Variable not set}
    ports:
      - "5432:5432"
    volumes:
      - crakcmode_postgres_data:/var/lib/postgresql/data/pgdata

volumes:
  crakcmode_postgres_data:
    external: true